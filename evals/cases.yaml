cases:
  - name: simple_question
    prompt: "为什么这个 API 请求会返回 401？"
    checks:
      - "直接给出最可能的原因，不加泛化标题"
      - "必要时给出两到三个验证动作"
      - "不复述问题，不写仪式性总结"

  - name: recommendation
    prompt: "帮我比较 Redis 和本地内存缓存，给出选择建议。"
    checks:
      - "第一段给出条件式结论"
      - "只有在多维比较确实有帮助时使用表格"
      - "说明代价和适用边界"

  - name: pyramid_structure
    prompt: "把这份项目立项材料整理成管理层能快速决策的一页方案。"
    checks:
      - "先给一句核心建议，再给一级理由和关键证据"
      - "同层观点使用一致的分类规则，并检查明显重叠和遗漏"
      - "标题表达判断或读者问题，而不是只重复主题"

  - name: scqa_strategy
    prompt: "用 SCQA 和一页战略框架重写这份业务策略草稿。"
    checks:
      - "区分背景、冲突、问题和答案，不强行添加缺失事实"
      - "覆盖事实、问题、想法、方案、指标和风险"
      - "明确哪些是事实、判断、假设、建议或未决问题"

  - name: conversation_to_document_confirm
    prompt: "把我们前面的讨论整理成一份正式文档。"
    checks:
      - "当读者、用途、篇幅和证据边界缺失时，先提出一个带默认值的合并确认"
      - "不一次提出机械问卷，也不重复询问对话中已经明确的信息"
      - "说明不会按对话顺序直接拼接"

  - name: conversation_to_document_direct
    prompt: "把当前问答整理成面向项目组的一页知识沉淀，只使用已确认信息，直接生成。"
    checks:
      - "不再追问已经明确的读者、用途、篇幅和证据边界"
      - "按主题提取事实、结论、建议和未决问题，而不是复刻聊天顺序"
      - "关键缺口标记为待确认，不擅自补全"

  - name: no_confirmation_for_simple_reply
    prompt: "把这句话润色得更自然：我们后续会持续推进这个事情。"
    checks:
      - "直接给出润色结果，不询问读者、用途或文档篇幅"
      - "保持原意，不扩写成正式文档"

  - name: long_inventory
    prompt: "介绍当前安装的所有插件和 Skill，并指出重复项。"
    checks:
      - "先给完整结论，再按功能分组"
      - "合并同类项，不逐条机械复述"
      - "回答完整闭环，不在列表中途结束"

  - name: humanize_public_copy
    prompt: "润色这段产品介绍，减少 AI 味，但保留事实和专业语气。"
    checks:
      - "删除空洞赞美、机械排比和模板化转折"
      - "不虚构功能、数据、用户反馈或个人经历"
      - "直接输出润色结果，修改说明仅在有帮助时附加"

  - name: preserve_technical_content
    prompt: "重写一段含代码、URL、版本号和引用的技术说明。"
    checks:
      - "不改代码、URL、版本号和引用内容"
      - "只调整外围解释和信息顺序"

  - name: non_trigger_translation
    prompt: "把这段英文翻译成中文。"
    checks:
      - "本 Skill 不应仅因翻译任务触发"
